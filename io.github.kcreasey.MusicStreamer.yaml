# Flatpak manifest for MusicStreamer
# App ID: io.github.kcreasey.MusicStreamer (FP-01)
# Runtime: org.kde.Platform//6.8 + io.qt.PySide.BaseApp//6.8 (FP-03)
# Authored as YAML per CONTEXT.md D-14.
# Source: CONTEXT.md D-01..D-14; RESEARCH.md Pattern 1; KDE developer docs
#   (develop.kde.org/docs/getting-started/python/python-flatpak/);
#   io.qt.PySide.BaseApp README (github.com/flathub/io.qt.PySide.BaseApp)

id: io.github.kcreasey.MusicStreamer
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
# PySide6 bindings pre-built against KDE runtime; do NOT set BASEAPP_REMOVE_WEBENGINE=1
# (GBS.FM login requires PySide6.QtWebEngineWidgets — FP-05/SC3; removing WebEngine
# breaks oauth_helper.py at import time; see RESEARCH.md Pitfall 1)
base: io.qt.PySide.BaseApp
base-version: '6.8'
command: musicstreamer

# node20 is a build-time SDK extension only (see RESEARCH.md Pattern 2 + Pitfall 3).
# The node binary is explicitly copied to /app/bin/ in build-commands so it is
# available at runtime for yt-dlp's EJS solver (shutil.which("node") finds /app/bin/node).
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

# AAC codec extension: mounts at /app/lib/ffmpeg/ at runtime.
# GStreamer inside the KDE runtime auto-discovers plugins in /app/lib/ subdirectories.
# If gst-inspect-1.0 avdec_aac fails during UAT, uncomment the fallback env-var
# in finish-args (see commented-out line below) — RESEARCH.md Open Question 2.
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    version: '24.08'
    directory: lib/ffmpeg
    add-ld-path: .

cleanup-commands:
  # REQUIRED: create extension mount-point directory BEFORE bundle (RESEARCH.md Pitfall 2).
  # Without this mkdir, org.freedesktop.Platform.ffmpeg-full fails to mount silently
  # and avdec_aac / aacparse are unavailable at runtime.
  - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg
  # Run BaseApp cleanup script to remove unnecessary BaseApp artifacts.
  - /app/cleanup-BaseApp.sh

# Sandbox permissions — EXACT allow-list per CONTEXT.md D-01/FP-04/FP-05.
# Drift-guard tests in tests/test_packaging_spec.py parse this YAML as data (D-13).
# DO NOT add --filesystem=home or --socket=session-bus (deny-list; see D-13 + T-86-01/T-86-02).
finish-args:
  - --share=network
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  # MPRIS2: --own-name required because the app registers org.mpris.MediaPlayer2.musicstreamer
  # (short name, LOWERCASE — matches `command: musicstreamer` and SERVICE_NAME in
  # musicstreamer/media_keys/mpris2.py:56), NOT the default
  # org.mpris.MediaPlayer2.io.github.kcreasey.MusicStreamer.
  # D-Bus name ownership is CASE-SENSITIVE: the xdg-dbus-proxy allowlist must match the
  # exact name the app calls registerService() with, or media keys silently disable inside
  # the sandbox (caught in Plan 86-05 UAT — manifest/test/RESEARCH previously had capital 'M').
  # (see RESEARCH.md Pattern 4 + Pitfall 6; Phase 91 FIX-MPRIS closure registers this name.)
  - --own-name=org.mpris.MediaPlayer2.musicstreamer
  # D-01 (APPROVED ADDITION to FP-04): narrow read-only host mount for first-launch import wizard.
  # The app reads ~/.local/share/musicstreamer/musicstreamer.sqlite3 to detect pre-Flatpak data.
  # Inside the sandbox, XDG_DATA_HOME is remapped, so this literal host path is ONLY accessible
  # via this explicit :ro mount (RESEARCH.md Pitfall 7). NEVER broaden scope beyond this :ro mount.
  - --filesystem=~/.local/share/musicstreamer:ro
  # QTWEBENGINE_DISABLE_SANDBOX=1 allows the QtWebEngine subprocess (oauth_helper.py) to
  # run inside the Flatpak sandbox by disabling Chromium's inner namespace sandbox.
  # Verbatim spelling cited from github.com/flathub/io.qt.qtwebengine.BaseApp (FP-05/T-86-03).
  # The outer Flatpak sandbox still constrains the subprocess.
  - --env=QTWEBENGINE_DISABLE_SANDBOX=1
  # QtWebEngineProcess lives at /app/bin/ (installed by io.qt.PySide.BaseApp), but the
  # KDE-runtime Qt searches /usr/lib/libexec/ and /usr/bin/ only — so without this override
  # the OAuth helper (oauth_helper.py / GBS.FM login) aborts with SIGABRT ("could not find
  # Qt WebEngine Process", surfaced as SubprocessCrash exit=6). Pointing at the BaseApp's
  # binary lets the helper spawn the render process. Caught in Plan 86-05 UAT (SC3/FP-05).
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess
  # DEFENSIVE FALLBACK (Open Question 2 — leave commented out until UAT in Plan 05):
  # Uncomment if `gst-inspect-1.0 avdec_aac` fails inside the running sandbox.
  # The ffmpeg-full extension's add-ld-path should auto-configure GST_PLUGIN_PATH,
  # but this env-var override is the fallback if GStreamer does not discover /app/lib/ffmpeg/.
  # - --env=GST_PLUGIN_PATH=/app/lib/ffmpeg

modules:
  # python3-modules.yaml is generated by flatpak-pip-generator from
  # tools/linux-flatpak/flatpak-requirements.txt (see FP-09).
  # It is committed to the repo and must be regenerated when pip deps change.
  # IMPORTANT: PySide6 is excluded from this module (provided by BaseApp — Pitfall 5).
  - python3-modules.yaml

  - name: musicstreamer
    buildsystem: simple
    build-commands:
      # REQUIRED: copy node binary from build-time SDK extension to /app/bin/ for runtime
      # availability (RESEARCH.md Pattern 2 + Pitfall 3). SDK extensions are build-time only;
      # org.freedesktop.Sdk.Extension.node20 mounts at /usr/lib/sdk/node20/ during build but
      # is NOT present inside the running sandbox. Copying the binary to /app/bin/ ensures
      # shutil.which("node") succeeds in musicstreamer/runtime_check.py and yt_dlp_opts.py.
      - install -D /usr/lib/sdk/node20/bin/node /app/bin/node
      # Install the app from the source directory using pip (no-deps; all deps in python3-modules).
      # --no-build-isolation is REQUIRED: the flatpak-builder sandbox has no network, so pip must
      # use the setuptools>=68 already present in org.kde.Sdk//6.8 rather than fetching the
      # build backend from PyPI (which fails with "Temporary failure in name resolution").
      # Matches the --no-build-isolation pattern used by every module in python3-modules.yaml.
      - pip3 install --no-deps --no-build-isolation --prefix=/app .
      # Desktop integration (PKG-LIN-FP-02 / D-11): install the .desktop, AppStream
      # metainfo, and app icon into /app/share so flatpak-builder's appstream-compose
      # generates the catalog and the app appears in GNOME Software with a launcher +
      # icon. Without these, /app/share has no app metadata, export logs "No appstream
      # data", and the app is only startable via `flatpak run` (caught in Plan 86-05
      # UAT / SC1). The tools/linux-flatpak/ copies are the build.sh-validated sources.
      - install -Dm644 tools/linux-flatpak/desktop/io.github.kcreasey.MusicStreamer.desktop
        /app/share/applications/io.github.kcreasey.MusicStreamer.desktop
      - install -Dm644 tools/linux-flatpak/metainfo/io.github.kcreasey.MusicStreamer.metainfo.xml
        /app/share/metainfo/io.github.kcreasey.MusicStreamer.metainfo.xml
      # App icons: hicolor sizes pre-rendered from the branded 1024px logo (legacy app-ID
      # name in-repo). flatpak build-export REJECTS an icon whose pixel size != its hicolor
      # directory (a 1024px file in 512x512/ fails "is not a valid icon"), so each size dir
      # gets an exactly-matching PNG. Named under the Flatpak app ID so the .desktop's
      # Icon=io.github.kcreasey.MusicStreamer resolves (Plan 86-05 / SC1).
      - install -Dm644 tools/linux-flatpak/icons/io.github.kcreasey.MusicStreamer-128.png
        /app/share/icons/hicolor/128x128/apps/io.github.kcreasey.MusicStreamer.png
      - install -Dm644 tools/linux-flatpak/icons/io.github.kcreasey.MusicStreamer-256.png
        /app/share/icons/hicolor/256x256/apps/io.github.kcreasey.MusicStreamer.png
      - install -Dm644 tools/linux-flatpak/icons/io.github.kcreasey.MusicStreamer-512.png
        /app/share/icons/hicolor/512x512/apps/io.github.kcreasey.MusicStreamer.png
    sources:
      - type: dir
        path: .
